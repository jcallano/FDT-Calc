name: Deploy FTL PWA to GitHub Pages

on:
  # Se ejecuta al hacer push a las ramas main o master
  push:
    branches: ["main", "master"]
  # Permite ejecutar este workflow manualmente desde la pestaña Actions
  workflow_dispatch:

# Otorga los permisos necesarios al GITHUB_TOKEN para publicar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue concurrente, omitiendo las ejecuciones en cola
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefactos
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube la carpeta ftd_webapp donde está index.html
          path: './ftl_webapp'

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
